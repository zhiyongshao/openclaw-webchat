name: Build Android APK

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Try to ensure Android SDK build-tools
        run: |
          # Try to pre-install build-tools to avoid download during build
          if [ -d "$ANDROID_HOME/build-tools" ]; then
            echo "Android SDK build-tools found:"
            ls "$ANDROID_HOME/build-tools/"
          fi
          # Set ANDROID_SDK_ROOT to help Gradle find SDK
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV

      - name: Setup Gradle
        run: |
          chmod +x gradlew
          ./gradlew wrapper --gradle-version=8.4

      - name: Build debug APK
        run: |
          ./gradlew clean assembleDebug --no-daemon 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-webchat-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Build release APK
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          ./gradlew assembleRelease --no-daemon 2>&1

      - name: Upload release APK
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-webchat-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90
