name: Build Android APK

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v2
        with:
          api-level: 34
          build-tools: '34.0.0'

      - name: Debug SDK paths
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls -la "$ANDROID_HOME/" 2>/dev/null || echo "ANDROID_HOME not found"
          ls -la "$ANDROID_HOME/build-tools/" 2>/dev/null || echo "build-tools not found"
          ls -la "$ANDROID_HOME/platforms/" 2>/dev/null || echo "platforms not found"

      - name: Setup Gradle
        run: |
          chmod +x gradlew
          ./gradlew wrapper --gradle-version=8.4

      - name: Build debug APK
        run: |
          ./gradlew clean assembleDebug --no-daemon 2>&1 | tail -80

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: openclaw-webchat-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Build release APK
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          ./gradlew assembleRelease --no-daemon 2>&1

      - name: Upload release APK
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-webchat-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90
